<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-inter pb-20">

  <!-- HEADER HAUT -->
  <header class="w-full h-14 flex items-center justify-between px-4 sticky top-0 bg-white/80 dark:bg-gray-950/80 backdrop-blur z-50">
    <h1 class="font-sora text-2xl font-bold bg-gradient-to-r from-blue-600 to-blue-900 bg-clip-text text-transparent">Baobab</h1>
    <button onclick="showPage('settingsPage')" class="text-gray-600 dark:text-gray-300">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
  </header>

  <!-- TENDANCES -->
  <section id="homePage" class="page active px-2 pt-2">
    <div id="trendsList" class="space-y-1"></div>

    <!-- SUGGESTIONS PUCE -->
    <div class="flex gap-2 mt-4 px-2 overflow-x-auto pb-2">
      <div onclick="quickSearch('planete eleve 2.0')" class="flex items-center gap-1 bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-full text-sm whitespace-nowrap cursor-pointer">
        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        planete eleve 2.0
      </div>
    </div>
  </section>

  <!-- PAGE RESULTATS -->
  <section id="resultsPage" class="page px-4 pt-4">
    <div id="aiSummary" class="bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-blue-900/20 dark:to-indigo-900/20 border-l-4 border-blue-500 rounded-r-lg p-4 mb-4">
      <p class="text-sm font-semibold text-blue-800 dark:text-blue-300 mb-1">✨ Résumé IA par Baobab</p>
      <p id="aiText" class="text-sm"></p>
    </div>
    <p id="resultCount" class="text-sm text-gray-500 mb-3"></p>
    <div id="resultsList" class="space-y-5"></div>
  </section>

  <!-- PAGE PARAMETRES COMPLETS -->
  <section id="settingsPage" class="page px-4 pt-4 pb-10">
    <h2 class="text-2xl font-bold mb-4 font-sora">Paramètres</h2>
    
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 mb-4 shadow-sm border dark:border-gray-800">
      <h3 class="font-semibold mb-3">Recherche</h3>
      <label class="flex items-center justify-between py-2"><span>Afficher le résumé IA</span><input type="checkbox" id="aiSummaryToggle" checked class="w-5 h-5 accent-blue-600"></label>
      <label class="flex items-center justify-between py-2"><span>Ouvrir dans un nouvel onglet</span><input type="checkbox" id="openNewTab" checked class="w-5 h-5 accent-blue-600"></label>
      <label class="flex items-center justify-between py-2"><span>SafeSearch</span><input type="checkbox" id="safeSearch" class="w-5 h-5 accent-blue-600"></label>
      <div class="py-2">
        <label class="block mb-1 text-sm">Résultats par page</label>
        <select id="resultsPerPage" class="w-full bg-gray-100 dark:bg-gray-800 p-2 rounded-lg">
          <option value="10">10</option><option value="20">20</option><option value="50">50</option>
        </select>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 mb-4 shadow-sm border dark:border-gray-800">
      <h3 class="font-semibold mb-3">Langue & Région</h3>
      <select id="language" onchange="changeLanguage(this.value)" class="w-full bg-gray-100 dark:bg-gray-800 p-2 rounded-lg">
        <option value="fr">Français</option><option value="en">English</option><option value="wo">Wolof</option>
      </select>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 mb-4 shadow-sm border dark:border-gray-800">
      <h3 class="font-semibold mb-3">Apparence</h3>
      <label class="flex items-center py-2"><input type="radio" name="theme" value="light" checked class="mr-2 w-4 h-4 accent-blue-600"><span>Thème Clair</span></label>
      <label class="flex items-center py-2"><input type="radio" name="theme" value="dark" class="mr-2 w-4 h-4 accent-blue-600"><span>Thème Sombre</span></label>
      <label class="flex items-center py-2"><input type="radio" name="theme" value="auto" class="mr-2 w-4 h-4 accent-blue-600"><span>Automatique</span></label>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl p-4 mb-4 shadow-sm border dark:border-gray-800">
      <h3 class="font-semibold mb-3">Confidentialité</h3>
      <button onclick="clearHistory()" class="text-red-600">Effacer l'historique de recherche</button>
    </div>

    <button onclick="saveSettings()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white w-full py-3.5 rounded-full mt-2 font-bold">Enregistrer</button>
    <p id="saveMsg" class="text-green-600 text-center mt-3 hidden">✓ Paramètres enregistrés!</p>
    <button onclick="showPage('homePage')" class="mt-4 text-blue-600 w-full">← Retour à l'accueil</button>
  </section>

  <!-- BARRE DU BAS FIXE AVEC BS -->
  <div class="fixed bottom-0 left-0 right-0 h-16 bg-white dark:bg-gray-900 border-t dark:border-gray-800 flex items-center px-3">
    <form onsubmit="search(event)" class="flex-1 h-12 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center px-1">
      <!-- LOGO BS -->
      <div class="w-10 h-10 flex items-center justify-center mr-1">
        <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs">BS</div>
      </div>
      <input id="searchInput" type="text" placeholder="Rechercher sur Baobab..." class="bg-transparent outline-none w-full font-medium">
      <!-- Micro SVG -->
      <button type="button" onclick="alert('Recherche vocale bientôt')" class="p-2">
        <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Zm5 8c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2Z"/></svg>
      </button>
      <!-- Lens SVG -->
      <button type="button" onclick="alert('Recherche par image bientôt')" class="p-2">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#2563EB" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.19 0 2.34-.21 3.41-.59l-1.32-1.32C13.35 20.31 12.7 20.5 12 20.5 7.25 20.5 3.5 16.75 3.5 12S7.25 3.5 12 3.5 20.5 7.25 20.5 12c0 .7-.19 1.35-.5 1.91l1.32 1.32C21.79 14.34 22 13.19 22 12 22 6.48 17.52 2 12 2Z"/></svg>
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
  </html>
