<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 1. ACCUEIL -->
  <main id="home" class="page active">
    <header class="top-nav">
      <div class="logo" onclick="goHome()">BS</div>
      <button onclick="showPage('settings')">Paramètres</button>
    </header>

    <div class="home-center">
      <h1>Baobab <span>Search</span></h1>
      
      <!-- BARRE DE RECHERCHE -->
      <div class="search-bar" id="searchBar">
        <input id="searchInput" type="text" placeholder="Recher sur Baobab..." onfocus="showSuggestions()" oninput="liveSuggest()">
        
        <div class="search-icons">
          <button class="icon-btn" onclick="startVoice()" aria-label="Recherche vocale">
            <svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3zm5 8a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2z"/></svg>
          </button>
          <button class="icon-btn" onclick="startImageSearch()" aria-label="Recherche par image">
            <svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          </button>
          <button class="icon-btn primary" onclick="search()" aria-label="Recher">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM9.5 14A4.5 4.5 0 1 1 14 9.5 4.505 4.505 0 0 1 9.5 14z"/></svg>
          </button>
        </div>
      </div>

      <!-- ECRAN DE SAISIE -->
      <div id="suggestions" class="suggestions hidden">
        <div class="section-title">Historique récent</div>
        <div class="item">baobab dakar</div>
        <div class="item">météo louga</div>
        <div class="section-title">Suggestions</div>
        <div class="item">baobab arbre</div>
        <div class="item">baobab fruit bienfaits</div>
        <div class="shortcuts">
          <button>Images</button><button>Vidéos</button><button>Actualités</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 2. RESULTATS -->
  <main id="results" class="page">
    <header class="results-header">
      <div class="logo" onclick="goHome()">BS</div>
      <div class="search-bar small">
        <input id="searchInput2" type="text">
        <div class="search-icons">
          <button class="icon-btn" onclick="search()" aria-label="Recher">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM9.5 14A4.5 4.5 0 1 1 14 9.5 4.505 4.505 0 0 1 9.5 14z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div class="filter-bar">
      <button class="active">Tous</button>
      <button>Images</button>
      <button>Vidéos</button>
      <button>Actualités</button>
      <button>Maps</button>
    </div>

    <div id="resultsList" class="results"></div>
  </main>

  <!-- 3. PARAMETRES -->
  <main id="settings" class="page">
    <h2>Paramètres</h2>
    
    <div class="setting-group">
      <h3>Général</h3>
      <label>Langue de recherche: <select><option>Français</option><option>English</option><option>Wolof</option></select></label>
      <label>Région: <select><option>Sénégal</option><option>France</option></select></label>
      <label><input type="checkbox"> SafeSearch</label>
    </div>

    <div class="setting-group">
      <h3>Vie privée & Historique</h3>
      <label><input type="checkbox" checked> Enregistrer l'activité</label>
      <button onclick="clearHistory()">Effacer l'historique récent</button>
    </div>

    <div class="setting-group">
      <h3>Apparence</h3>
      <label>Thème: 
        <select onchange="setTheme(this.value)">
          <option value="system">Système</option>
          <option value="light">Clair</option>
          <option value="dark">Sombre</option>
        </select>
      </label>
      <label>Taille du texte: 
        <select onchange="setFontSize(this.value)">
          <option value="14px">Petit</option>
          <option value="16px">Moyen</option>
          <option value="18px">Grand</option>
        </select>
      </label>
    </div>

    <div class="setting-group">
      <h3>Confidentialité & Compte</h3>
      <label><input type="checkbox"> Résultats personnels</label>
      <button>Se déconnecter</button>
    </div>
    <button class="back" onclick="goHome()">Retour</button>
  </main>

<script src="script.js"></script>
</body>
            </html>
