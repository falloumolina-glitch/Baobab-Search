<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab IA - L'IA de la connaissance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
  .font-sora { font-family: 'Sora', sans-serif; }
  .bs-badge { background: linear-gradient(135deg, #000 50%, #2563EB 50%); } /* Noir + Bleu */
 .ai-glow { box-shadow: 0 0 20px rgba(37, 99, 235, 0.2); }
  </style>
</head>
<body class="bg-white text-gray-900">

  <!-- HEADER -->
  <header id="header" class="w-full h-16 flex items-center justify-end px-6 fixed top-0 bg-white z-50 border-b hidden">
    <a href="#" class="text-gray-600 hover:text-blue-600 mr-6">Images</a>
    <a href="#" class="text-gray-600 hover:text-blue-600 mr-6">Gmail</a>
    <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs">BS</div>
  </header>

  <!-- PAGE ACCUEIL -->
  <section id="homePage" class="min-h-screen flex-col items-center justify-center px-4">
    <h1 class="font-sora text-7xl font-bold text-black">Baobab</h1>
    <p class="text-gray-500 mt-2 mb-10">L'IA de la connaissance</p>

    <!-- Barre de recherche IA -->
    <form onsubmit="search(event)" class="w-[580px] max-w-[95%] h-14 bg-white border-gray-200 rounded-full shadow-sm hover:shadow-md ai-glow flex items-center px-5">
      <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs mr-3">BS</div>
      <input id="searchInput" type="text" placeholder="Demande à Baobab IA..." class="w-full outline-none bg-transparent text-base">
      <button type="submit" class="text-blue-600 hover:text-blue-800">🔍</button>
    </form>

    <div class="mt-8 flex gap-3">
      <button onclick="search(event)" class="bg-gray-100 hover:bg-gray-200 px-5 py-2 rounded text-sm font-medium">Baobab Search</button>
      <button onclick="luckySearch()" class="bg-gray-100 hover:bg-gray-200 px-5 py-2 rounded text-sm font-medium">J'ai de la chance</button>
    </div>

    <!-- Footer -->
    <footer class="absolute bottom-0 w-full bg-gray-100">
      <div class="px-8 py-3 border-b text-sm text-gray-600">Sénégal</div>
      <div class="px-8 py-3 flex gap-6 text-sm text-gray-600">
        <a href="#" class="hover:underline">À propos</a>
        <a href="#" class="hover:underline">Publicité</a>
        <a href="#" class="hover:underline">Confidentialité</a>
        <a href="#" class="hover:underline">Conditions</a>
      </div>
    </footer>
  </section>

  <!-- PAGE RESULTATS -->
  <section id="resultsPage" class="pt-20 pb-20 hidden">
    <!-- Barre recherche en haut -->
    <div class="max-w-7xl mx-auto px-6">
      <form onsubmit="search(event)" class="w-[692px] h-12 bg-white border-gray-300 rounded-full shadow-sm flex items-center px-5">
        <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs mr-3">BS</div>
        <input id="searchInput2" type="text" class="w-full outline-none bg-transparent">
        <button type="submit" class="text-blue-600">🔍</button>
      </form>
    </div>

    <!-- Filtres -->
    <nav class="max-w-7xl mx-auto px-6 mt-4 border-b flex gap-6 text-sm text-gray-600">
      <a class="border-b-2 border-blue-600 text-blue-600 pb-3">Tous</a>
      <a class="pb-3 hover:text-blue-600">Images</a>
      <a class="pb-3 hover:text-blue-600">Actualités</a>
      <a class="pb-3 hover:text-blue-600">IA Réponse</a>
    </nav>

    <div class="max-w-7xl mx-auto px-6 flex gap-10 mt-6">
      <!-- Colonne Résultats -->
      <div class="w-[650px]">
        <!-- AI SUMMARY -->
        <div id="aiSummary" class="bg-blue-50 border-blue-200 rounded-xl p-4 mb-6">
          <p class="text-sm font-semibold text-blue-800 mb-2">✨ Résumé IA par Baobab</p>
          <p id="aiText" class="text-sm text-gray-700">Chargement de la réponse IA...</p>
        </div>

        <p id="resultCount" class="text-sm text-gray-600">Environ 0 résultats</p>
        <div id="resultsList" class="mt-4"></div>
      </div>

      <!-- Colonne Droite IA Knowledge -->
      <div class="w-[350px] border rounded-xl p-4 h-fit bg-gray-50">
        <h3 class="font-sora font-bold text-xl">Connaissance IA</h3>
        <p id="knowledgeText" class="text-sm mt-2 text-gray-600">L'IA analyse votre requête...</p>
      </div>
    </div>
  </section>

  <script>
    // FAKE API - On simule des résultats. Tu pourras connecter Bing/Google API après
    const fakeDB = {
      "messi": {
        ai: "Lionel Messi est un footballeur argentin considéré comme l'un des meilleurs joueurs de l'histoire. Il a remporté 8 Ballons d'Or et la Coupe du Monde 2022.",
        knowledge: "Lionel Messi. Footballeur professionnel argentin. Né le 24 juin 1987.",
        results: [
          {url: "wikipedia.org > Lionel_Messi", title: "Lionel Messi - Wikipédia", desc: "Lionel Andrés Messi est un footballeur international argentin..."},
          {url: "psg.fr > messi", title: "Messi au PSG - Site Officiel", desc: "Retrouvez toutes les stats et actualités de Leo Messi au Paris Saint-Germain."}
        ]
      },
      "baobab": {
        ai: "Le baobab est un arbre emblématique d'Afrique, symbole de sagesse. Il peut vivre 1000 ans et stocker 120 000L d'eau.",
        knowledge: "Baobab. Arbre. Famille des Malvacées. Origine: Afrique.",
        results: [
          {url: "baobab.sn", title: "Baobab Search - L'IA de la connaissance", desc: "Le premier moteur de recherche intelligent d'Afrique."}
        ]
      }
    };

    function search(e) {
      e.preventDefault();
      const query = document.getElementById('searchInput').value || document.getElementById('searchInput2').value;
      if(!query) return;

      document.getElementById('homePage').classList.add('hidden');
      document.getElementById('resultsPage').classList.remove('hidden');
      document.getElementById('header').classList.remove('hidden');
      document.getElementById('searchInput2').value = query;

      const data = fakeDB[query.toLowerCase()] || {ai: `Voici un résumé IA pour: ${query}`, knowledge: `Information sur ${query}`, results: []};

      // Affiche IA
      document.getElementById('aiText').innerText = data.ai;
      document.getElementById('knowledgeText').innerText = data.knowledge;
      document.getElementById('resultCount').innerText = `Environ ${data.results.length} résultats`;

      // Affiche résultats
      const list = document.getElementById('resultsList');
      list.innerHTML = '';
      data.results.forEach(r => {
        list.innerHTML += `
          <div class="mb-6">
            <div class="text-sm text-green-700">${r.url}</div>
            <a class="text-xl text-blue-700 hover:underline">${r.title}</a>
            <p class="text-sm text-gray-700 mt-1">${r.desc}</p>
          </div>
        `;
      });
    }

    function luckySearch() {
      document.getElementById('searchInput').value = 'baobab';
      search(event);
    }
  </script>
</body>
      </html>
