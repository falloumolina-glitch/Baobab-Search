<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8F9FA] dark:bg-[#121212] text-[#475569] dark:text-gray-300 font-inter">

  <!-- BARRE DE PROGRESSION CHARGEMENT -->
  <div id="progressBar" class="fixed top-0 left-0 h-1 bg-[#2563EB] z-50 transition-all duration-300 w-0"></div>

  <!-- MENU PARAMETRES -->
  <div id="sidebar" class="fixed top-0 right-0 h-full w-80 bg-white dark:bg-[#1E293B] shadow-2xl z-50 translate-x-full transition-transform duration-300">
    <div class="p-4 border-b border-[#E2E8F0] dark:border-gray-700 flex items-center justify-between">
      <h2 class="font-sora text-lg font-bold text-[#1E293B]">Paramètres</h2>
      <button onclick="toggleSidebar()" class="p-2 text-[#64748B]">
        <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-4 space-y-4 overflow-y-auto h-[calc(100%-65px)]">
      <div>
        <h3 class="font-semibold mb-2 text-[#1E293B]">Recherche</h3>
        <label class="flex items-center justify-between py-2 text-sm"><span>SafeSearch</span><input type="checkbox" id="safeSearch" class="w-5 h-5 accent-[#2563EB]"></label>
      </div>
      <div>
        <h3 class="font-semibold mb-2 text-[#1E293B]">Langue & Région</h3>
        <label class="text-sm">Interface</label>
        <select id="language" onchange="changeLanguage(this.value)" class="w-full mt-1 bg-[#F1F5F9] dark:bg-gray-800 p-2 rounded-lg text-sm">
          <option value="fr">Français</option><option value="en">English</option>
        </select>
        <label class="text-sm mt-3 block">Région</label>
        <select id="region" class="w-full mt-1 bg-[#F1F5F9] dark:bg-gray-800 p-2 rounded-lg text-sm">
          <option value="SN">Sénégal</option><option value="FR">France</option><option value="US">États-Unis</option>
        </select>
      </div>
      <div>
        <h3 class="font-semibold mb-2 text-[#1E293B]">Historique</h3>
        <label class="flex items-center justify-between py-2 text-sm"><span>Activer l'historique</span><input type="checkbox" id="saveHistory" class="w-5 h-5 accent-[#2563EB]"></label>
        <button onclick="clearHistory()" class="btn-secondary w-full py-2 rounded-lg text-sm">Effacer l'historique</button>
      </div>
      <div>
        <h3 class="font-semibold mb-2 text-[#1E293B]">Apparence</h3>
        <select id="theme" class="w-full bg-[#F1F5F9] dark:bg-gray-800 p-2 rounded-lg text-sm">
          <option value="system">Système</option><option value="light">Clair</option><option value="dark">Sombre</option>
        </select>
      </div>
      <div class="text-xs text-[#64748B] pt-4 border-t">Baobab v0.1 MVP</div>
    </div>
  </div>
  <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

  <!-- HEADER RESULTS -->
  <header id="mainHeader" class="w-full h-14 flex items-center px-4 sticky top-0 bg-white/90 dark:bg-[#121212]/90 backdrop-blur z-30 border-b border-[#E2E8F0] dark:border-gray-800 hidden">
    <h1 onclick="goHome()" class="font-sora text-xl font-bold text-[#2563EB] cursor-pointer mr-4">Baobab</h1>
    <form onsubmit="search(event)" class="flex-1 h-10 bg-[#F1F5F9] dark:bg-[#1E293B] rounded-full flex items-center px-3 relative">
      <svg class="w-5 h-5 text-[#64748B] mr-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="searchInputHeader" type="text" oninput="showAutocomplete(this.value)" class="bg-transparent outline-none w-full text-sm text-[#1E293B]">
      <button type="button" id="clearBtnHeader" onclick="clearInput('searchInputHeader')" class="p-1 text-[#64748B] hidden">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <div id="autocompleteList" class="absolute top-12 left-0 right-0 bg-white dark:bg-[#1E293B] rounded-lg shadow-lg hidden z-50"></div>
    </form>
    <button onclick="toggleSidebar()" class="p-2 ml-2 text-[#64748B]">
      <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/></svg>
    </button>
  </header>

  <!-- 1. PAGE D'ACCUEIL MINIMALISTE -->
  <section id="homePage" class="page active min-h-screen flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-2xl text-center">
      <h1 class="font-sora text-6xl font-bold text-[#2563EB] mb-8">Baobab</h1>
      
      <!-- BARRE DE RECHERCHE CENTRALE -->
      <form onsubmit="search(event)" class="w-full h-14 bg-white dark:bg-[#1E293B] rounded-full flex items-center px-2 shadow-md relative">
        <svg class="w-5 h-5 text-[#64748B] ml-4 mr-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="searchInput" type="text" oninput="showAutocomplete(this.value, 'searchInput')" placeholder="Recher sur Baobab" class="bg-transparent outline-none w-full font-medium text-[#1E293B]">
        <button type="button" id="clearBtn" onclick="clearInput('searchInput')" class="p-3 text-[#64748B] hidden">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <button type="button" onclick="startVoice()" class="p-3 text-[#64748B]">
          <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Zm5 8c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2Z"/></svg>
        </button>
        <button type="button" onclick="takePhoto()" class="p-3 text-[#64748B]">
          <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
        </button>
        <div id="autocompleteListHome" class="absolute top-16 left-0 right-0 bg-white dark:bg-[#1E293B] rounded-lg shadow-lg hidden z-50"></div>
      </form>

      <!-- BOUTONS D'ACTION -->
      <div class="flex justify-center gap-3 mt-6">
        <button onclick="search(event)" class="btn-secondary px-6 py-2 rounded-md">Recher</button>
        <button onclick="imFeelingLucky()" class="btn-secondary px-6 py-2 rounded-md">J'ai de la chance</button>
      </div>
    </div>

    <!-- PIED DE PAGE -->
    <footer class="absolute bottom-4 flex gap-6 text-sm text-[#64748B]">
      <a href="#" onclick="showPage('aboutPage')">À propos</a>
      <a href="#" onclick="showPage('privacyPage')">Confidentialité</a>
      <a href="#" onclick="showPage('termsPage')">Conditions</a>
    </footer>
  </section>

  <!-- 2. PAGE DES RESULTATS -->
  <section id="resultsPage" class="page px-0 pt-2">
    <!-- FILTRES -->
    <div class="border-b border-[#E2E8F0] dark:border-gray-800 px-4">
      <div class="flex gap-6 overflow-x-auto">
        <button onclick="switchTab('all')" id="tab-all" class="tab-btn pb-3 border-b-2 border-[#2563EB] text-[#2563EB] font-semibold">Tous</button>
        <button onclick="switchTab('images')" id="tab-images" class="tab-btn pb-3 border-b-2 border-transparent text-[#64748B]">Images</button>
        <button onclick="switchTab('videos')" id="tab-videos" class="tab-btn pb-3 border-b-2 border-transparent text-[#64748B]">Vidéos</button>
        <button onclick="switchTab('news')" id="tab-news" class="tab-btn pb-3 border-b-2 border-transparent text-[#64748B]">Actualités</button>
        <button onclick="switchTab('maps')" id="tab-maps" class="tab-btn pb-3 border-b-2 border-transparent text-[#64748B]">Maps</button>
      </div>
    </div>

    <div class="px-4 pt-4 max-w-4xl mx-auto">
      <!-- PANNEAU INFO INSTANTANEE -->
      <div id="instantPanel" class="hidden bg-[#EFF6FF] border-[#BFDBFE] rounded-lg p-4 mb-4">
        <p id="instantText" class="text-[#1E293B]"></p>
      </div>

      <!-- BLOCS DE RESULTATS -->
      <div id="resultsList" class="space-y-6"></div>
      <div id="offlineMsg" class="hidden text-center py-10 text-red-500">Vous êtes hors ligne. Vérifiez votre connexion.</div>
    </div>
  </section>

  <!-- PAGES LEGALES -->
  <section id="aboutPage" class="page px-4 pt-4 pb-10 max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-4">À propos</h2><button onclick="goHome()" class="btn-primary px-6 py-2 rounded-full">Retour</button></section>
  <section id="termsPage" class="page px-4 pt-4 pb-10 max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-4">Conditions</h2><button onclick="goHome()" class="btn-primary px-6 py-2 rounded-full">Retour</button></section>
  <section id="privacyPage" class="page px-4 pt-4 pb-10 max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-4">Confidentialité</h2><button onclick="goHome()" class="btn-primary px-6 py-2 rounded-full">Retour</button></section>

  <input type="file" id="fileInput" class="hidden">
  <script src="script.js"></script>
</body>
          </html>
